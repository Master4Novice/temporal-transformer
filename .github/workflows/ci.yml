name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Node ${{ matrix.node }} / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18, 20, 22, 24]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
      - run: npm ci
      - name: Build
        run: npm run build
      - name: Default tests
        run: npm test
      - name: Golden parity tests
        run: npm run test:golden

  bench:
    name: Benchmark sanity check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npm run bench
      - name: Upload bench results
        uses: actions/upload-artifact@v4
        env:
          SHA: ${{ github.sha }}
        with:
          name: benchmark-results-${{ env.SHA }}
          path: bench/RESULTS.md
          retention-days: 30
